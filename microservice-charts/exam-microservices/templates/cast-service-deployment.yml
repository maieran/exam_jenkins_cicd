apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-cast-service-deployment
  labels:
    app: jenkins-cast-service-deployment

spec:
  revisionHistoryLimit: {{ .Values.castService.revisionHistoryLimit }}
  replicas: {{ .Values.castService.replicaCount }}

  strategy:
    type: RollingUpdate
  
    rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1

  selector:
    matchLabels:
      app: jenkins-cast-service-deployment
  
  template:
    metadata: 
      labels:
        app: jenkins-cast-service-deployment
  
    spec:
      terminationGracePeriodSeconds: {{ .Values.castService.spec.terminationGracePeriodSeconds }}

      initContainers:
      - name: wait-for-postgresql-db
        image: "{{ .Values.images.postgres.repository }}:{{ .Values.images.postgres.tag }}"
        imagePullPolicy: {{ .Values.images.castService.pullPolicy }}
        command: ["sh", "-c"]
        args:
        - | 
          until pg_isready -h jenkins-psql-cast-db -p {{ .Values.castDatabase.service.port }}; do
            echo "Waiting jenkins-psql-cast-db..."
            sleep 2
          done

          echo "jenkins-psql-cast-db is ready."
      containers: 
      - name: jenkins-cast-service-deployment
        image: "{{ .Values.images.castService.repository }}:{{ .Values.images.castService.tag }}"
        imagePullPolicy: {{ .Values.images.castService.pullPolicy }}
        command:
          - python
          - -m
          - uvicorn
        args:
          - app.main:app 
          - --host 
          - 0.0.0.0 
          - --port 
          - {{ .Values.castService.service.targetPort | quote }}
          - --loop
          - asyncio
        ports:
          - name: http
            protocol: TCP
            containerPort: {{ .Values.castService.service.port }}

        env:
          - name: DATABASE_URI
            valueFrom:
              secretKeyRef:
                name: {{ .Values.secrets.cast.existingSecret }}
                key: cast-database-uri

        startupProbe:
          tcpSocket:
            port: http
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 30

        readinessProbe:
          tcpSocket:
            port: http
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          tcpSocket:
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
                  
        resources:
          requests:
            cpu: {{ .Values.castService.resources.requests.cpu }}
            memory: {{ .Values.castService.resources.requests.memory }}
          limits:
            cpu: {{ .Values.castService.resources.limits.cpu }}
            memory: {{ .Values.castService.resources.limits.memory }}