server {
  listen 8080;

  location = /healthz {
      access_log off;
      default_type text/plain;
      return 200 "ok\n";
  }
  
  location /api/v1/movies {
    proxy_pass http://jenkins-movie-service-service:8000;
  }

  location /api/v1/casts {
    proxy_pass http://jenkins-cast-service-service:8000;
  }

}