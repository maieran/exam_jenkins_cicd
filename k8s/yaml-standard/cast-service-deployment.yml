apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-cast-service-deployment
  labels:
    app: jenkins-cast-service-deployment

spec:
  revisionHistoryLimit: 3
  replicas: 1

  strategy:
    type: RollingUpdate
  
    rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1

  selector:
    matchLabels:
      app: jenkins-cast-service-deployment
  
  template:
    metadata: 
      labels:
        app: jenkins-cast-service-deployment
  
    spec:
      terminationGracePeriodSeconds: 30

      initContainers:
      - name: wait-for-postgresql-db
        image: postgres:12.1-alpine
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args: #equivalent to depends_on 
        - | 
          until pg_isready -h jenkins-psql-cast-db -p 5432; do
            echo "Waiting jenkins-psql-cast-db..."
            sleep 2
          done

          echo "jenkins-psql-cast-db is ready."
      containers: 
      - name: jenkins-cast-service-deployment
        image: andrem43/exam-cast-service-jenkins:latest
        imagePullPolicy: Always
        command:
          - python
          - -m
          - uvicorn
        args:
          - app.main:app 
          - --host 
          - 0.0.0.0 
          - --port 
          - "8000"
          - --loop
          - asyncio
        ports:
          - name: http
            protocol: TCP
            containerPort: 8000

        env:
          - name: DATABASE_URI
            valueFrom:
              secretKeyRef:
                name: exam-cast-credentials
                key: cast-database-uri

        startupProbe:
          tcpSocket:
            port: http
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 30

        readinessProbe:
          tcpSocket:
            port: http
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          tcpSocket:
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
                  
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi