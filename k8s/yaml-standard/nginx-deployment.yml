apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-nginx-deployment
  labels:
    app: jenkins-nginx-deployment
spec:
  revisionHistoryLimit: 3
  replicas: 1

  selector:
    matchLabels:
      app: jenkins-nginx-deployment

  template:
    metadata:
      labels:
        app: jenkins-nginx-deployment

    spec:

      restartPolicy: Always
      containers:
        - name: jenkins-nginx-deployment
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent

          ports:
          - name: http
            containerPort: 8080
            protocol: TCP
          
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

          volumeMounts:
            - name: nginx-config-storage
              mountPath: /etc/nginx/conf.d
              readOnly: true             
      volumes:
      - name: nginx-config-storage
        configMap:
          name: jenkins-nginx-configmap
          items:
            - key: default.conf
              path: default.conf
